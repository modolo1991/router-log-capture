services:
  app:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
      - "${SYSLOG_PORT:-514}:514/udp"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - syslogs_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp:
    build: .
    command: python mcp_server.py
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
      LOG_API_URL: http://app:8080
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  syslogs_data:
