<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router Logs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; font-size: 14px; }

        #status-bar {
            display: flex; gap: 24px; padding: 10px 20px;
            background: #242424; border-bottom: 1px solid #3a3a3a;
            align-items: center; flex-wrap: wrap;
        }
        #status-bar strong { color: #fff; font-size: 15px; }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .dot.ok  { background: #4caf50; }
        .dot.err { background: #f44336; }
        .dot.unk { background: #777; }
        #last-poll { color: #666; font-size: 12px; margin-left: auto; }

        #filters {
            padding: 10px 20px; background: #1e1e1e;
            border-bottom: 1px solid #3a3a3a;
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        #filters input, #filters select {
            background: #2d2d2d; color: #e0e0e0;
            border: 1px solid #444; padding: 5px 10px;
            border-radius: 4px; font-family: monospace; font-size: 13px;
        }
        #filter-search { flex: 1; min-width: 180px; }
        button {
            background: #333; color: #e0e0e0;
            border: 1px solid #555; padding: 5px 14px;
            border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px;
        }
        button:hover { background: #444; }
        #auto-refresh-btn.active { background: #1b4d1e; border-color: #4caf50; color: #81c784; }

        #log-container { overflow-x: auto; max-height: calc(100vh - 100px); overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th {
            background: #242424; padding: 7px 12px; text-align: left;
            position: sticky; top: 0; z-index: 1;
            border-bottom: 1px solid #3a3a3a; color: #bbb;
            font-weight: normal; text-transform: uppercase; font-size: 11px;
        }
        td { padding: 5px 12px; border-bottom: 1px solid #252525; vertical-align: top; }
        tr:hover td { background: #222; }
        td.msg { max-width: 600px; word-break: break-word; }

        .CRITICAL { color: #ef5350; font-weight: bold; }
        .ERROR    { color: #ef5350; }
        .WARNING  { color: #ff9800; }
        .INFO     { color: #9e9e9e; }

        #empty-msg { text-align: center; padding: 40px; color: #555; }
    </style>
</head>
<body>

<div id="status-bar">
    <strong>Router Logs</strong>
    <div class="status-item">
        <span class="dot unk" id="collector-dot"></span>
        <span id="collector-label">Collector: —</span>
    </div>
    <div class="status-item">
        <span class="dot unk" id="router-dot"></span>
        <span id="router-label">Router: —</span>
    </div>
    <span id="last-poll"></span>
</div>

<div id="filters">
    <input type="datetime-local" id="f-start" title="Start time">
    <input type="datetime-local" id="f-end" title="End time">
    <select id="f-level">
        <option value="">All levels</option>
        <option value="CRITICAL">CRITICAL</option>
        <option value="ERROR">ERROR</option>
        <option value="WARNING">WARNING</option>
        <option value="INFO">INFO</option>
    </select>
    <input type="text" id="filter-search" placeholder="Search message…">
    <button onclick="applyFilters()">Search</button>
    <button id="auto-refresh-btn" class="active" onclick="toggleAutoRefresh()">Auto-refresh: ON</button>
    <button onclick="exportLogs()">Export JSON</button>
</div>

<div id="log-container">
    <table>
        <thead>
            <tr>
                <th style="width:170px">Timestamp</th>
                <th style="width:80px">Level</th>
                <th style="width:130px">Source</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody id="log-body"></tbody>
    </table>
    <div id="empty-msg" style="display:none">No log entries found.</div>
</div>

<script>
    let autoRefresh = true;

    async function fetchStatus() {
        try {
            const r = await fetch('/api/status');
            const s = await r.json();
            const cd = document.getElementById('collector-dot');
            cd.className = 'dot ' + (s.running ? 'ok' : 'err');
            document.getElementById('collector-label').textContent =
                'Collector: ' + (s.running ? 'Running' : 'Stopped');
            const rd = document.getElementById('router-dot');
            rd.className = 'dot ' + (s.router_reachable ? 'ok' : 'err');
            document.getElementById('router-label').textContent =
                'Router: ' + (s.router_reachable ? 'Reachable' : 'Unreachable');
            if (s.last_success) {
                document.getElementById('last-poll').textContent =
                    'Last poll: ' + new Date(s.last_success).toLocaleTimeString();
            }
        } catch (e) {
            document.getElementById('collector-label').textContent = 'Collector: API error';
        }
    }

    async function fetchLogs() {
        const start  = document.getElementById('f-start').value;
        const end    = document.getElementById('f-end').value;
        const level  = document.getElementById('f-level').value;
        const search = document.getElementById('filter-search').value.trim();
        const hasFilter = start || end || level || search;

        let url;
        if (hasFilter) {
            const p = new URLSearchParams({ limit: 500 });
            if (start)  p.set('start',  new Date(start).toISOString());
            if (end)    p.set('end',    new Date(end).toISOString());
            if (level)  p.set('level',  level);
            if (search) p.set('search', search);
            url = '/api/logs?' + p;
        } else {
            url = '/api/logs/recent?limit=500';
        }

        try {
            const r = await fetch(url);
            const logs = await r.json();
            renderLogs(logs);
        } catch (e) {
            console.error('Failed to fetch logs', e);
        }
    }

    function renderLogs(logs) {
        const tbody = document.getElementById('log-body');
        const empty = document.getElementById('empty-msg');
        if (!logs.length) {
            tbody.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        tbody.innerHTML = logs.map(log => `
            <tr>
                <td>${new Date(log.timestamp).toLocaleString()}</td>
                <td class="${log.level}">${esc(log.level)}</td>
                <td>${esc(log.source)}</td>
                <td class="msg">${esc(log.message)}</td>
            </tr>
        `).join('');
    }

    function esc(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function applyFilters() { fetchLogs(); }

    function toggleAutoRefresh() {
        autoRefresh = !autoRefresh;
        const btn = document.getElementById('auto-refresh-btn');
        btn.textContent = 'Auto-refresh: ' + (autoRefresh ? 'ON' : 'OFF');
        btn.className = autoRefresh ? 'active' : '';
    }

    function exportLogs() {
        const start  = document.getElementById('f-start').value;
        const end    = document.getElementById('f-end').value;
        const level  = document.getElementById('f-level').value;
        const search = document.getElementById('filter-search').value.trim();
        const p = new URLSearchParams({ format: 'json' });
        if (start)  p.set('start',  new Date(start).toISOString());
        if (end)    p.set('end',    new Date(end).toISOString());
        if (level)  p.set('level',  level);
        if (search) p.set('search', search);
        window.location.href = '/api/export?' + p;
    }

    async function tick() {
        await Promise.all([fetchStatus(), fetchLogs()]);
    }

    setInterval(() => { if (autoRefresh) tick(); }, 15000);
    tick();
</script>
</body>
</html>
